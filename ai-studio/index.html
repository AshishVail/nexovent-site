<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexovent AI Studio | Final Build</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: #f8fafc; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .active-chip { background: linear-gradient(135deg, #2563eb, #7c3aed) !important; border: none !important; box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3); }
        .loader { border-top-color: #3b82f6; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen p-4">
    <div class="max-w-4xl mx-auto space-y-6 pt-10">
        <header class="glass p-6 rounded-3xl flex justify-between items-center">
            <h1 class="text-xl font-800 tracking-tighter uppercase"><i class="fa-solid fa-microchip text-blue-500 mr-2"></i>Nexovent Studio</h1>
            <span class="text-[10px] bg-green-500/20 text-green-400 px-3 py-1 rounded-full font-bold">SYSTEM ONLINE</span>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="glass p-6 rounded-3xl space-y-6">
                <div>
                    <label class="text-[10px] font-bold text-gray-500 uppercase tracking-widest block mb-3 text-white">Style</label>
                    <div class="space-y-2">
                        <button onclick="setOpt('style', 'Photorealistic', this)" class="s-btn active-chip w-full p-3 rounded-xl border border-white/5 text-xs text-left">📸 Realistic</button>
                        <button onclick="setOpt('style', 'Cyberpunk Neon', this)" class="s-btn w-full p-3 rounded-xl border border-white/5 text-xs text-left">🌃 Cyberpunk</button>
                        <button onclick="setOpt('style', 'Anime Ghibli', this)" class="s-btn w-full p-3 rounded-xl border border-white/5 text-xs text-left">🎨 Anime</button>
                    </div>
                </div>
                <div>
                    <label class="text-[10px] font-bold text-gray-500 uppercase tracking-widest block mb-3 text-white">Ratio</label>
                    <div class="flex gap-2">
                        <button onclick="setOpt('ratio', '16:9', this)" class="r-btn active-chip flex-1 py-2 rounded-lg border border-white/5 text-[10px]">16:9</button>
                        <button onclick="setOpt('ratio', '1:1', this)" class="r-btn flex-1 py-2 rounded-lg border border-white/5 text-[10px]">1:1</button>
                    </div>
                </div>
            </div>

            <div class="md:col-span-2 space-y-6">
                <div class="glass p-8 rounded-[32px] space-y-6">
                    <textarea id="uInp" class="w-full h-32 bg-transparent text-2xl font-light outline-none resize-none" placeholder="Describe your idea..."></textarea>
                    <div class="flex flex-col gap-4">
                        <div class="cf-turnstile" data-sitekey="0x4AAAAAAAC8Q1xRQMVIesdD4" data-theme="dark"></div>
                        <button id="mainBtn" onclick="generate()" class="w-full bg-blue-600 hover:bg-blue-700 py-4 rounded-2xl font-bold flex items-center justify-center gap-2 transition-all">
                            <span>GENERATE PROMPT</span> <i class="fa-solid fa-wand-magic-sparkles"></i>
                        </button>
                    </div>
                </div>

                <div id="resBox" class="hidden glass p-8 rounded-[32px] border-l-4 border-blue-500">
                    <div class="flex justify-between items-center mb-4">
                        <span class="text-[10px] font-bold text-blue-400">PROMPT READY</span>
                        <button onclick="copy()" class="text-xs text-gray-400 hover:text-white"><i class="fa-solid fa-copy"></i> Copy</button>
                    </div>
                    <p id="outTxt" class="text-lg text-gray-200 italic leading-relaxed"></p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // API Configuration
        const KEY = "AIzaSyAaKDz3ENsoRscOKwEgngsCMg41q6YbnI4";
        let opts = { style: 'Photorealistic', ratio: '16:9' };

        function setOpt(t, v, el) {
            document.querySelectorAll('.' + (t==='style'?'s':'r') + '-btn').forEach(b => b.classList.remove('active-chip'));
            el.classList.add('active-chip');
            opts[t] = v;
        }

        async function generate() {
            const inp = document.getElementById('uInp').value;
            const btn = document.getElementById('mainBtn');
            const turnstile = document.querySelector('[name="cf-turnstile-response"]')?.value;

            if (!inp) return alert("Write something first!");
            if (!turnstile) return alert("Please verify Security Check!");

            btn.disabled = true;
            btn.innerHTML = `<div class="w-5 h-5 border-2 border-white/30 loader rounded-full"></div> <span>AI THINKING...</span>`;

            try {
                // Fixed Gemini API call logic
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Create a professional image prompt for: "${inp}". Style: ${opts.style}. Aspect Ratio: --ar ${opts.ratio}. Focus on lighting and 8k detail. Response only with prompt text.` }] }]
                    })
                });

                const data = await response.json();
                
                if (data.candidates && data.candidates[0].content) {
                    const result = data.candidates[0].content.parts[0].text;
                    document.getElementById('resBox').classList.remove('hidden');
                    document.getElementById('outTxt').innerText = result;
                    document.getElementById('resBox').scrollIntoView({ behavior: 'smooth' });
                } else {
                    alert("AI Error: Please check your API key status.");
                }
            } catch (err) {
                alert("Connection Error! Try again.");
            } finally {
                btn.disabled = false;
                btn.innerHTML = `<span>GENERATE PROMPT</span> <i class="fa-solid fa-wand-magic-sparkles"></i>`;
            }
        }

        function copy() {
            navigator.clipboard.writeText(document.getElementById('outTxt').innerText);
            alert("Copied to clipboard!");
        }
    </script>
</body>
</html>
