<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexovent Studio | Professional AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #02040a; color: #f0f6fc; }
        .glass-ui { background: rgba(13, 17, 23, 0.8); backdrop-filter: blur(15px); border: 1px solid #30363d; }
        .neon-glow { color: #58a6ff; text-shadow: 0 0 15px rgba(88, 166, 255, 0.4); }
        .btn-master { background: linear-gradient(135deg, #1f6feb, #388bfd); transition: 0.4s ease; border: none; font-weight: 800; }
        .btn-master:hover { transform: scale(1.02); box-shadow: 0 0 30px rgba(31, 111, 235, 0.5); }
        .output-box { border-left: 4px solid #238636; background: rgba(35, 134, 54, 0.05); }
        textarea::placeholder { color: #484f58; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-10 flex flex-col items-center">

    <div class="max-w-3xl w-full space-y-8">
        <header class="text-center space-y-3">
            <h1 class="text-4xl font-800 tracking-tighter uppercase italic">Nexovent <span class="neon-glow">Studio</span></h1>
            <div class="flex items-center justify-center gap-2">
                <span class="h-2 w-2 bg-green-500 rounded-full animate-pulse"></span>
                <p class="text-[10px] text-gray-500 font-bold uppercase tracking-[0.4em]">Meta Llama 3.1 Pro Engine Active</p>
            </div>
        </header>

        <div class="glass-ui p-8 rounded-[40px] shadow-2xl space-y-6">
            <div class="relative">
                <textarea id="userInput" class="w-full h-40 bg-transparent text-2xl font-light outline-none resize-none leading-snug" placeholder="Describe your vision (e.g. A futuristic city in rain)..."></textarea>
            </div>

            <div class="flex flex-col md:flex-row gap-4 items-center justify-between pt-6 border-t border-gray-800">
                <div class="flex gap-3">
                    <select id="styleSelect" class="bg-[#0d1117] border border-gray-700 rounded-xl px-4 py-2 text-xs font-bold outline-none cursor-pointer">
                        <option value="Hyper-Realistic Photography">📸 Photography</option>
                        <option value="Cinematic Anime Style">🎨 Anime Art</option>
                        <option value="Cyberpunk 2077 Aesthetic">🏙️ Cyberpunk</option>
                        <option value="Oil Painting Masterpiece">🖌️ Artistic</option>
                    </select>
                </div>
                
                <button id="igniteBtn" onclick="runNexoventEngine()" class="btn-master w-full md:w-auto px-12 py-4 rounded-2xl text-white uppercase tracking-widest text-sm">
                    Ignite Engine <i class="fa-solid fa-bolt ml-2"></i>
                </button>
            </div>
        </div>

        <div id="resultArea" class="hidden glass-ui p-8 rounded-[35px] output-box animate-in fade-in slide-in-from-bottom-4 duration-700">
            <div class="flex justify-between items-center mb-4">
                <span class="text-[10px] font-black text-green-500 uppercase tracking-widest">Masterpiece Generated</span>
                <button onclick="copyPrompt()" class="text-[10px] bg-gray-800 hover:bg-gray-700 px-4 py-2 rounded-lg transition-all">COPY</button>
            </div>
            <p id="outputText" class="text-lg text-gray-300 font-light italic leading-relaxed"></p>
        </div>
    </div>

    <script>
        // Your Hugging Face Access Token
        const HF_KEY = "hf_OUjZmK9tvZ7toyDnOPkCJMqB3soCQBI4"; 

        async function runNexoventEngine() {
            const input = document.getElementById('userInput').value.trim();
            const style = document.getElementById('styleSelect').value;
            const btn = document.getElementById('igniteBtn');
            const resArea = document.getElementById('resultArea');
            const resText = document.getElementById('outputText');

            if (!input) return alert("Bhai, pehle kuch likho toh sahi!");

            btn.disabled = true;
            btn.innerHTML = `ENGINEERING... <i class="fa-solid fa-circle-notch animate-spin ml-2"></i>`;

            try {
                // Meta Llama 3.1 8B Instruct Model - Fast & High Quality
                const response = await fetch("https://api-inference.huggingface.co/models/meta-llama/Meta-Llama-3.1-8B-Instruct", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${HF_KEY}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        inputs: `<|begin_of_text|><|start_header_id|>user<|end_header_id|>\n\nAct as a professional prompt engineer. Create a very detailed, long, and cinematic image generation prompt for: "${input}". Style should be: ${style}. Mention lighting, camera lens, and 8k details. Response with only the final prompt.<|eot_id|><|start_header_id|>assistant<|end_header_id|>\n\n`,
                        parameters: { max_new_tokens: 300, temperature: 0.7 }
                    })
                });

                const data = await response.json();
                
                if (data[0] && data[0].generated_text) {
                    let fullText = data[0].generated_text;
                    // Safely extract only the AI's response
                    let result = fullText.split("<|end_header_id|>")[2] || fullText;
                    
                    resArea.classList.remove('hidden');
                    resText.innerText = result.trim();
                    resArea.scrollIntoView({ behavior: 'smooth' });
                } else {
                    alert("Model is loading or busy. Please try again in 10 seconds.");
                }
            } catch (error) {
                alert("Network issue! Check your internet or API Token.");
            } finally {
                btn.disabled = false;
                btn.innerHTML = `Ignite Engine <i class="fa-solid fa-bolt ml-2"></i>`;
            }
        }

        function copyPrompt() {
            const text = document.getElementById('outputText').innerText;
            navigator.clipboard.writeText(text);
            alert("Prompt Copied to Clipboard!");
        }
    </script>
</body>
</html>
