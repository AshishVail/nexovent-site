<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexovent Studio | Pro Build</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: #f8fafc; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .active-chip { background: linear-gradient(135deg, #2563eb, #7c3aed) !important; color: white !important; }
    </style>
</head>
<body class="min-h-screen py-10 px-4">
    <div class="max-w-4xl mx-auto space-y-6">
        
        <header class="glass p-6 rounded-[30px] flex justify-between items-center">
            <h1 class="text-xl font-800 tracking-tighter uppercase">Nexovent <span class="text-blue-500">Studio</span></h1>
            <div id="status" class="text-[10px] font-bold text-yellow-400 bg-yellow-400/10 px-4 py-1.5 rounded-full uppercase">Ready to Ignite</div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <aside class="space-y-4">
                <div class="glass p-6 rounded-[30px] space-y-6">
                    <div>
                        <h3 class="text-[10px] font-bold text-gray-500 uppercase mb-4 tracking-widest">Model Style</h3>
                        <div class="flex flex-col gap-2">
                            <button onclick="setConf('s','8k Photography',this)" class="s-btn active-chip w-full text-left p-3 rounded-xl border border-white/5 text-xs transition-all">📸 Photography</button>
                            <button onclick="setConf('s','Cyberpunk Neon',this)" class="s-btn w-full text-left p-3 rounded-xl border border-white/5 text-xs transition-all">🌃 Cyberpunk</button>
                        </div>
                    </div>
                </div>
            </aside>

            <main class="md:col-span-2 space-y-6">
                <div class="glass p-8 rounded-[40px]">
                    <textarea id="uInput" class="w-full h-32 bg-transparent text-2xl font-light placeholder-gray-800 outline-none resize-none" placeholder="Enter your vision..."></textarea>
                    
                    <div class="flex flex-col gap-6 mt-6 pt-6 border-t border-white/5">
                        <div class="cf-turnstile" data-sitekey="0x4AAAAAAAC8Q1xRQMVIesdD4" data-theme="dark"></div>
                        <button id="runBtn" onclick="askAI()" class="w-full bg-blue-600 hover:bg-blue-700 py-5 rounded-2xl font-bold flex items-center justify-center gap-3">
                            <span>GENERATE</span> <i class="fa-solid fa-fire"></i>
                        </button>
                    </div>
                </div>

                <div id="outBox" class="hidden glass p-8 rounded-[40px] border-l-4 border-blue-500">
                    <div class="flex justify-between items-center mb-4">
                        <span class="text-[10px] font-bold text-blue-400">PROMPT CREATED</span>
                        <button onclick="copy()" class="text-xs text-gray-400 hover:text-white">Copy</button>
                    </div>
                    <p id="outText" class="text-lg text-gray-300 italic"></p>
                </div>
            </main>
        </div>
    </div>

    <script>
        const API_KEY = "AIzaSyA1ghu59-2eKBR_zumXk2yvrcuTK1CQXUM";
        let config = { s: '8k Photography', r: '16:9' };

        function setConf(t,v,el) {
            document.querySelectorAll('.'+t+'-btn').forEach(b=>b.classList.remove('active-chip'));
            el.classList.add('active-chip');
            config[t] = v;
        }

        async function askAI() {
            const inp = document.getElementById('uInput').value.trim();
            const btn = document.getElementById('runBtn');
            const turnstile = document.querySelector('[name="cf-turnstile-response"]')?.value;

            if(!inp) return alert("Write something!");
            if(!turnstile) return alert("Verify Turnstile!");

            btn.disabled = true;
            btn.innerHTML = `<i class="fa-solid fa-spinner animate-spin"></i> <span>GENERATING...</span>`;

            try {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;
                
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Act as a pro prompt engineer. Idea: "${inp}". Style: ${config.s}. Output ONLY the prompt.` }] }]
                    })
                });

                const data = await response.json();
                
                if(data.candidates) {
                    document.getElementById('outBox').classList.remove('hidden');
                    document.getElementById('outText').innerText = data.candidates[0].content.parts[0].text;
                    document.getElementById('status').innerText = "Generated Successfully";
                    document.getElementById('status').className = "text-[10px] font-bold text-green-400 bg-green-400/10 px-4 py-1.5 rounded-full uppercase";
                } else {
                    alert("AI could not respond. Check if API key is enabled in Google Cloud Console.");
                }
            } catch(e) {
                alert("Connection Error! This might be a browser block.");
            } finally {
                btn.disabled = false;
                btn.innerHTML = `<span>GENERATE</span> <i class="fa-solid fa-fire"></i>`;
            }
        }

        function copy() {
            navigator.clipboard.writeText(document.getElementById('outText').innerText);
            alert("Copied!");
        }
    </script>
</body>
</html>
