<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexovent AI Studio | Pro Prompt Lab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #05070a; color: white; transition: background 0.8s ease; }
        .glass-effect { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .active-btn { background: #2563eb !important; border-color: #3b82f6 !important; }
    </style>
</head>
<body class="min-h-screen bg-fixed bg-cover bg-center">
    <div class="flex h-screen overflow-hidden">
        <aside class="w-64 glass-effect p-6 hidden md:flex flex-col border-r border-white/10">
            <div class="text-2xl font-800 mb-10 tracking-tighter text-blue-500">NEXOVENT<span class="text-white">.AI</span></div>
            <nav class="space-y-4 flex-1">
                <button class="w-full flex items-center space-x-3 p-3 rounded-xl bg-blue-600/10 text-blue-400 border border-blue-600/20"><span>🚀</span> <span>Prompt Engine</span></button>
                <div id="historyContainer" class="mt-10 space-y-3 overflow-y-auto max-h-60"></div>
            </nav>
        </aside>

        <main class="flex-1 overflow-y-auto p-4 md:p-10">
            <div class="max-w-5xl mx-auto">
                <header class="mb-10">
                    <h1 class="text-4xl font-800">AI Prompt Studio</h1>
                    <p class="text-gray-400 mt-2">Professional Midjourney & DALL-E prompts generator.</p>
                </header>

                <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
                    <div class="lg:col-span-4 space-y-6">
                        <div class="glass-effect p-6 rounded-3xl space-y-6">
                            <label class="text-[10px] font-bold text-gray-500 uppercase tracking-widest block">Art Style</label>
                            <div class="grid grid-cols-2 gap-2">
                                <button onclick="setStyle('Cinematic', this)" class="style-btn p-3 border border-white/10 rounded-xl text-xs active-btn">🎬 Cinematic</button>
                                <button onclick="setStyle('Cyberpunk', this)" class="style-btn p-3 border border-white/10 rounded-xl text-xs">🌃 Cyberpunk</button>
                            </div>
                        </div>
                    </div>

                    <div class="lg:col-span-8 space-y-6">
                        <div class="glass-effect p-8 rounded-3xl">
                            <textarea id="userInput" class="w-full h-40 bg-transparent text-2xl font-light placeholder-gray-700 outline-none resize-none" placeholder="अपना आईडिया यहाँ लिखें..."></textarea>
                            <div class="flex flex-col md:flex-row justify-between items-center mt-6 pt-6 border-t border-white/10 gap-4">
                                <div class="cf-turnstile" data-sitekey="0x4AAAAAAAC8Q1xRQMVIesdD4" data-theme="dark"></div>
                                <button id="genBtn" onclick="generateProPrompt()" class="bg-blue-600 hover:bg-blue-700 px-10 py-4 rounded-2xl font-bold transition">Generate Masterpiece</button>
                            </div>
                        </div>
                        <div id="resultBox" class="hidden glass-effect p-8 rounded-3xl border-l-4 border-blue-500">
                            <p id="generatedText" class="text-xl text-gray-200 leading-relaxed italic"></p>
                            <button onclick="copyText()" class="mt-4 text-xs bg-blue-600/20 text-blue-400 px-4 py-2 rounded-full">COPY</button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
