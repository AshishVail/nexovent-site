<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexovent AI Studio | Pro Prompt Lab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: #f8fafc; }
        .glass-card { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(24px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .active-chip { background: linear-gradient(135deg, #2563eb, #9333ea) !important; color: white !important; border: none !important; }
        .neon-text { background: linear-gradient(135deg, #60a5fa 0%, #c084fc 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-10">
    <div class="max-w-5xl mx-auto space-y-8">
        <header class="flex justify-between items-center glass-card p-6 rounded-[32px]">
            <div class="flex items-center gap-3">
                <i class="fa-solid fa-bolt-lightning text-blue-500 text-2xl"></i>
                <h1 class="text-2xl font-800 tracking-tighter uppercase">Nexovent <span class="neon-text">Studio</span></h1>
            </div>
            <div class="text-[10px] font-bold text-blue-400 bg-blue-400/10 px-4 py-2 rounded-full uppercase">Gemini 1.5 Pro AI</div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <aside class="lg:col-span-4 space-y-6">
                <div class="glass-card p-6 rounded-[32px] space-y-6">
                    <div>
                        <h3 class="text-xs font-bold text-gray-500 uppercase mb-4 tracking-widest">Select Style</h3>
                        <div class="grid grid-cols-1 gap-2">
                            <button onclick="updateStyle('Cinematic Photo', this)" class="style-btn active-chip w-full text-left p-4 rounded-2xl border border-white/5 text-sm transition-all">📸 Cinematic Pro</button>
                            <button onclick="updateStyle('Anime Illustration', this)" class="style-btn w-full text-left p-4 rounded-2xl border border-white/5 text-sm transition-all">🎨 Anime Art</button>
                            <button onclick="updateStyle('Cyberpunk Digital', this)" class="style-btn w-full text-left p-4 rounded-2xl border border-white/5 text-sm transition-all">🌃 Cyberpunk</button>
                        </div>
                    </div>
                    <div>
                        <h3 class="text-xs font-bold text-gray-500 uppercase mb-4 tracking-widest">Aspect Ratio</h3>
                        <div class="flex gap-2">
                            <button onclick="updateRatio('16:9', this)" class="ratio-btn active-chip flex-1 py-3 rounded-xl border border-white/5 text-xs">16:9</button>
                            <button onclick="updateRatio('1:1', this)" class="ratio-btn flex-1 py-3 rounded-xl border border-white/5 text-xs">1:1</button>
                            <button onclick="updateRatio('9:16', this)" class="ratio-btn flex-1 py-3 rounded-xl border border-white/5 text-xs">9:16</button>
                        </div>
                    </div>
                </div>
            </aside>

            <main class="lg:col-span-8 space-y-6">
                <div class="glass-card p-8 rounded-[40px]">
                    <textarea id="promptInput" class="w-full h-44 bg-transparent text-3xl font-light placeholder-gray-800 outline-none resize-none" placeholder="Enter your idea (e.g. A futuristic tiger)..."></textarea>
                    
                    <div class="flex flex-col md:flex-row justify-between items-center mt-8 pt-8 border-t border-white/5 gap-6">
                        <div class="cf-turnstile" data-sitekey="0x4AAAAAAAC8Q1xRQMVIesdD4" data-theme="dark"></div>
                        <button id="igniteBtn" onclick="runAI()" class="w-full md:w-auto bg-blue-600 hover:bg-blue-700 px-10 py-5 rounded-2xl font-800 text-lg flex items-center justify-center gap-3 transition-all">
                            <span>IGNITE AI</span> <i class="fa-solid fa-sparkles"></i>
                        </button>
                    </div>
                </div>

                <div id="resultArea" class="hidden glass-card p-8 rounded-[40px] border-l-4 border-blue-500 animate-pulse">
                    <div class="flex justify-between items-center mb-4">
                        <span class="text-[10px] font-black uppercase text-blue-400">Masterpiece Prompt</span>
                        <button onclick="copyOutput()" class="text-xs bg-white/5 px-4 py-2 rounded-full hover:bg-white/10">Copy</button>
                    </div>
                    <p id="outputText" class="text-xl text-gray-200 font-light italic"></p>
                </div>
            </main>
        </div>
    </div>

    <script>
        const API_KEY = "AIzaSyAaKDz3ENsoRscOKwEgngsCMg41q6YbnI4";
        let config = { style: 'Cinematic Photo', ratio: '16:9' };

        function updateStyle(val, el) {
            document.querySelectorAll('.style-btn').forEach(b => b.classList.remove('active-chip'));
            el.classList.add('active-chip');
            config.style = val;
        }

        function updateRatio(val, el) {
            document.querySelectorAll('.ratio-btn').forEach(b => b.classList.remove('active-chip'));
            el.classList.add('active-chip');
            config.ratio = val;
        }

        async function runAI() {
            const input = document.getElementById('promptInput').value.trim();
            const btn = document.getElementById('igniteBtn');
            const resArea = document.getElementById('resultArea');
            const turnstile = document.querySelector('[name="cf-turnstile-response"]')?.value;

            if (!input) return alert("Please enter an idea!");
            if (!turnstile) return alert("Please complete the Security Check!");

            btn.disabled = true;
            btn.innerHTML = `<span>THINKING...</span> <i class="fa-solid fa-circle-notch animate-spin"></i>`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Professional Image Prompt for: "${input}". Style: ${config.style}. Aspect Ratio: --ar ${config.ratio}. Output prompt only.` }] }]
                    })
                });

                const data = await response.json();
                const result = data.candidates[0].content.parts[0].text;
                
                resArea.classList.remove('hidden');
                document.getElementById('outputText').innerText = result;
                resArea.scrollIntoView({ behavior: 'smooth' });

            } catch (err) {
                alert("AI Error! Check your connection.");
            } finally {
                btn.disabled = false;
                btn.innerHTML = `<span>IGNITE AI</span> <i class="fa-solid fa-sparkles"></i>`;
            }
        }

        function copyOutput() {
            navigator.clipboard.writeText(document.getElementById('outputText').innerText);
            alert("Copied!");
        }
    </script>
</body>
</html>
