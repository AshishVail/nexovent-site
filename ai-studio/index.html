<!DOCTYPE html>
<html lang="en">
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexovent Studio | Pro AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: #f8fafc; }
        .glass { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .active-chip { background: linear-gradient(135deg, #3b82f6, #8b5cf6) !important; color: white !important; border: none !important; box-shadow: 0 8px 20px rgba(59, 130, 246, 0.3); }
        .neon-btn { transition: all 0.3s ease; border: 1px solid rgba(59, 130, 246, 0.3); }
        .neon-btn:hover { box-shadow: 0 0 20px rgba(59, 130, 246, 0.4); transform: translateY(-2px); }
    </style>
</head>
<body class="min-h-screen py-10 px-4">
    <div class="max-w-5xl mx-auto space-y-8">
        
        <div class="glass p-6 rounded-[32px] flex justify-between items-center">
            <div class="flex items-center gap-3">
                <i class="fa-solid fa-wand-magic-sparkles text-blue-500 text-2xl"></i>
                <h1 class="text-2xl font-800 tracking-tighter uppercase">Nexovent <span class="text-blue-500">Studio</span></h1>
            </div>
            <div class="flex items-center gap-2 text-[10px] font-black text-blue-400 bg-blue-500/10 px-4 py-2 rounded-full uppercase tracking-widest">
                <span class="w-2 h-2 bg-blue-500 rounded-full animate-ping"></span> Gemini 1.5 Pro
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-4 space-y-6">
                <div class="glass p-8 rounded-[35px] space-y-8">
                    <div>
                        <h3 class="text-xs font-bold text-gray-500 uppercase tracking-[0.2em] mb-5">Output Style</h3>
                        <div class="grid grid-cols-1 gap-3">
                            <button onclick="updateSettings('style', 'Hyper-Realistic 8k Photography', this)" class="style-btn active-chip w-full text-left p-4 rounded-2xl border border-white/5 text-sm font-semibold">📸 Photography</button>
                            <button onclick="updateSettings('style', 'Cyberpunk Digital Art Illustration', this)" class="style-btn w-full text-left p-4 rounded-2xl border border-white/5 text-sm font-semibold">🌃 Cyberpunk</button>
                            <button onclick="updateSettings('style', 'Studio Ghibli Anime Style', this)" class="style-btn w-full text-left p-4 rounded-2xl border border-white/5 text-sm font-semibold">🎨 Anime Art</button>
                        </div>
                    </div>
                    <div>
                        <h3 class="text-xs font-bold text-gray-500 uppercase tracking-[0.2em] mb-4">Ratio</h3>
                        <div class="flex gap-3">
                            <button onclick="updateSettings('ratio', '16:9', this)" class="ratio-btn active-chip flex-1 py-3 rounded-xl border border-white/5 text-xs font-bold">16:9</button>
                            <button onclick="updateSettings('ratio', '9:16', this)" class="ratio-btn flex-1 py-3 rounded-xl border border-white/5 text-xs font-bold">9:16</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-8 space-y-6">
                <div class="glass p-10 rounded-[45px] neon-border">
                    <textarea id="mainInput" class="w-full h-44 bg-transparent text-3xl font-light placeholder-gray-800 outline-none resize-none leading-tight" placeholder="Imagine a futuristic tiger in Mumbai..."></textarea>
                    
                    <div class="flex flex-col md:flex-row justify-between items-center mt-10 pt-10 border-t border-white/5 gap-8">
                        <div class="cf-turnstile" data-sitekey="0x4AAAAAAAC8Q1xRQMVIesdD4" data-theme="dark"></div>
                        <button id="igniteBtn" onclick="generatePrompt()" class="w-full md:w-auto bg-blue-600 neon-btn px-12 py-5 rounded-2xl font-800 text-lg flex items-center justify-center gap-3">
                            <span>GENERATE</span> <i class="fa-solid fa-fire-glow"></i>
                        </button>
                    </div>
                </div>

                <div id="outputContainer" class="hidden glass p-10 rounded-[45px] border-l-8 border-blue-600 animate-in fade-in duration-1000">
                    <div class="flex justify-between items-center mb-6">
                        <span class="text-[10px] font-black text-blue-500 uppercase tracking-[0.3em]">AI Masterpiece Prompt</span>
                        <button onclick="copyToClipboard()" class="text-xs bg-white/5 hover:bg-white/10 px-5 py-2 rounded-full transition-all">Copy Prompt</button>
                    </div>
                    <p id="outputText" class="text-xl md:text-2xl text-gray-200 font-light italic leading-relaxed"></p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const CONFIG = {
            API_KEY: "AIzaSyAaKDz3ENsoRscOKwEgngsCMg41q6YbnI4",
            style: "Hyper-Realistic 8k Photography",
            ratio: "16:9"
        };

        function updateSettings(type, value, el) {
            const btns = document.querySelectorAll('.' + type + '-btn');
            btns.forEach(b => b.classList.remove('active-chip'));
            el.classList.add('active-chip');
            CONFIG[type] = value;
        }

        async function generatePrompt() {
            const input = document.getElementById('mainInput').value.trim();
            const btn = document.getElementById('igniteBtn');
            const outputArea = document.getElementById('outputContainer');
            const turnstile = document.querySelector('[name="cf-turnstile-response"]')?.value;

            if (!input) return alert("Please enter your idea!");
            if (!turnstile) return alert("Please complete the security check!");

            btn.disabled = true;
            btn.innerHTML = `<i class="fa-solid fa-spinner animate-spin"></i> <span>ANALYZING...</span>`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${CONFIG.API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [{
                                text: `Act as a professional prompt engineer. Convert this idea: "${input}" into a highly detailed image prompt. 
                                Style: ${CONFIG.style}. Aspect Ratio: --ar ${CONFIG.ratio}. 
                                Provide ONLY the final text prompt.`
                            }]
                        }]
                    })
                });

                const data = await response.json();
                
                if (data.candidates && data.candidates[0].content.parts[0].text) {
                    outputArea.classList.remove('hidden');
                    document.getElementById('outputText').innerText = data.candidates[0].content.parts[0].text;
                    outputArea.scrollIntoView({ behavior: 'smooth' });
                } else {
                    throw new Error("API Limit reached or Error.");
                }

            } catch (err) {
                console.error(err);
                alert("Connection Error. Please check your internet or try later.");
            } finally {
                btn.disabled = false;
                btn.innerHTML = `<span>GENERATE</span> <i class="fa-solid fa-fire-glow"></i>`;
            }
        }

        function copyToClipboard() {
            const text = document.getElementById('outputText').innerText;
            navigator.clipboard.writeText(text);
            alert("Prompt Copied!");
        }
    </script>
</body>
</html>
