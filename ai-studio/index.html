<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexovent Studio | Mistral AI Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #010204; color: #fff; }
        .mistral-card { background: rgba(15, 15, 20, 0.95); border: 1px solid #222; backdrop-filter: blur(20px); }
        .neon-text { color: #f5d0fe; text-shadow: 0 0 15px rgba(245, 208, 254, 0.4); }
        .btn-mistral { background: linear-gradient(135deg, #7c3aed, #4f46e5); transition: 0.5s; font-weight: 800; border: none; }
        .btn-mistral:hover { box-shadow: 0 0 40px rgba(124, 58, 237, 0.5); transform: translateY(-2px); }
        .output-box { border-left: 4px solid #7c3aed; background: rgba(124, 58, 237, 0.05); }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-6 md:p-12">

    <div class="max-w-3xl w-full space-y-10">
        <div class="text-center space-y-2">
            <h1 class="text-5xl font-800 tracking-tighter uppercase italic">Nexovent <span class="neon-text">Studio</span></h1>
            <p class="text-gray-500 text-[10px] tracking-[0.5em] font-bold">POWERED BY MISTRAL LARGE AI</p>
        </div>

        <div class="mistral-card p-10 rounded-[50px] shadow-2xl space-y-8">
            <textarea id="userInput" class="w-full h-40 bg-transparent text-3xl font-light placeholder-gray-800 outline-none resize-none border-none" placeholder="अपना विजन यहाँ लिखें..."></textarea>
            
            <div class="flex flex-col md:flex-row justify-between items-center pt-8 border-t border-white/5 gap-4">
                <div class="text-xs font-black uppercase tracking-widest text-purple-500">
                    <i class="fa-solid fa-microchip mr-2"></i> Mistral Engine v1.0
                </div>
                <button id="igniteBtn" onclick="generateWithMistral()" class="btn-mistral w-full md:w-auto px-16 py-5 rounded-2xl text-lg uppercase tracking-widest text-white">
                    IGNITE AI <i class="fa-solid fa-fire-lightning ml-2"></i>
                </button>
            </div>
        </div>

        <div id="resultArea" class="hidden mistral-card p-10 rounded-[50px] output-box">
            <div class="flex justify-between items-center mb-6">
                <span class="text-[10px] font-black text-purple-400 uppercase tracking-widest">Masterpiece Prompt Engineering:</span>
                <button onclick="copyText()" class="text-[10px] bg-white/5 hover:bg-white/10 px-4 py-2 rounded-lg transition-all font-bold">COPY</button>
            </div>
            <p id="outputText" class="text-xl text-gray-300 leading-relaxed italic font-light"></p>
        </div>
    </div>

    <script>
        // अपनी Mistral API Key यहाँ डालें
        const MISTRAL_KEY = "OUjZmK9tvZ7toyDnOPkCJMqB3soCQBI4"; 

        async function generateWithMistral() {
            const input = document.getElementById('userInput').value.trim();
            const btn = document.getElementById('igniteBtn');
            const resArea = document.getElementById('resultArea');
            const resText = document.getElementById('outputText');

            if(!input) return alert("Vision likho bhai!");

            btn.innerHTML = `ENGINEERING... <i class="fa-solid fa-spinner animate-spin ml-2"></i>`;
            btn.disabled = true;

            try {
                const response = await fetch("https://api.mistral.ai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${MISTRAL_KEY}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: "mistral-large-latest",
                        messages: [{
                            role: "user",
                            content: `Act as a world-class AI prompt engineer. Create a highly detailed, professional, and long image generation prompt for Midjourney/DALL-E based on this vision: "${input}". Include specific lighting, 35mm lens, atmospheric details, and 8k textures. Give me ONLY the prompt text, no extra words.`
                        }]
                    })
                });

                const data = await response.json();
                
                if(data.choices && data.choices[0].message) {
                    resArea.classList.remove('hidden');
                    resText.innerText = data.choices[0].message.content;
                    resArea.scrollIntoView({ behavior: 'smooth' });
                } else {
                    alert("Mistral Key Error: कृपया चेक करें कि आपकी Key सही है या नहीं।");
                }

            } catch (e) {
                alert("Network Issue: इंटरनेट या API Endpoint चेक करें।");
            } finally {
                btn.innerHTML = `IGNITE AI <i class="fa-solid fa-fire-lightning ml-2"></i>`;
                btn.disabled = false;
            }
        }

        function copyText() {
            const text = document.getElementById('outputText').innerText;
            navigator.clipboard.writeText(text);
            alert("Copied!");
        }
    </script>
</body>
</html>
