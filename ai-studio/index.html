<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexovent Studio | Pro Build</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: #f8fafc; }
        .glass { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .active-btn { background: linear-gradient(135deg, #2563eb, #7c3aed) !important; color: white !important; border: none !important; }
        .neon-border { border: 1px solid rgba(37, 99, 235, 0.2); transition: 0.3s; }
        .neon-border:focus-within { border-color: #2563eb; box-shadow: 0 0 20px rgba(37, 99, 235, 0.1); }
    </style>
</head>
<body class="min-h-screen py-10 px-4">
    <div class="max-w-4xl mx-auto space-y-8">
        
        <header class="glass p-6 rounded-[30px] flex justify-between items-center shadow-xl">
            <div class="flex items-center gap-3">
                <i class="fa-solid fa-wand-magic-sparkles text-blue-500 text-2xl"></i>
                <h1 class="text-2xl font-800 tracking-tighter uppercase">Nexovent <span class="text-blue-500">Studio</span></h1>
            </div>
            <div class="flex items-center gap-2 text-[10px] font-bold text-green-400 bg-green-400/10 px-4 py-2 rounded-full uppercase tracking-widest">
                <span class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></span> Ultra Fast Mode
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <aside class="space-y-4">
                <div class="glass p-6 rounded-[32px] space-y-6">
                    <div>
                        <h3 class="text-[10px] font-black text-gray-500 uppercase mb-4 tracking-widest">Select Style</h3>
                        <div class="flex flex-col gap-2">
                            <button onclick="setMode('style', 'Photorealistic, 8k, detailed', this)" class="s-btn active-btn w-full text-left p-4 rounded-2xl border border-white/5 text-xs font-bold transition-all">📸 Photography</button>
                            <button onclick="setMode('style', 'Anime, Studio Ghibli, colorful', this)" class="s-btn w-full text-left p-4 rounded-2xl border border-white/5 text-xs font-bold transition-all">🎨 Anime Art</button>
                        </div>
                    </div>
                </div>
            </aside>

            <main class="md:col-span-2 space-y-6">
                <div class="glass p-8 rounded-[40px] neon-border">
                    <textarea id="uInput" class="w-full h-40 bg-transparent text-3xl font-light placeholder-gray-800 outline-none resize-none leading-tight" placeholder="A majestic tiger..."></textarea>
                    
                    <div class="flex justify-end mt-6 pt-6 border-t border-white/5">
                        <button id="runBtn" onclick="askAI()" class="w-full md:w-auto bg-blue-600 hover:bg-blue-700 px-12 py-5 rounded-2xl font-800 text-lg flex items-center justify-center gap-3 shadow-lg shadow-blue-600/20 transition-all active:scale-95">
                            <span>GENERATE</span> <i class="fa-solid fa-fire"></i>
                        </button>
                    </div>
                </div>

                <div id="outBox" class="hidden glass p-10 rounded-[45px] border-l-8 border-blue-600 animate-in fade-in duration-500">
                    <div class="flex justify-between items-center mb-6">
                        <span class="text-[10px] font-black text-blue-500 uppercase tracking-widest">AI Result</span>
                        <button onclick="copy()" class="text-xs bg-white/5 hover:bg-white/10 px-5 py-2 rounded-full transition-all">Copy</button>
                    </div>
                    <p id="outText" class="text-xl text-gray-200 font-light italic leading-relaxed"></p>
                </div>
            </main>
        </div>
    </div>

    <script>
        // Use the active Key you shared
        const API_KEY = "AIzaSyA1ghu59-2eKBR_zumXk2yvrcuTK1CQXUM";
        let config = { style: 'Photorealistic, 8k, detailed' };

        function setMode(type, val, el) {
            document.querySelectorAll('.' + (type === 'style' ? 's' : 'r') + '-btn').forEach(b => b.classList.remove('active-btn'));
            el.classList.add('active-btn');
            config[type] = val;
        }

        async function askAI() {
            const inp = document.getElementById('uInput').value.trim();
            const btn = document.getElementById('runBtn');
            const box = document.getElementById('outBox');

            if (!inp) return alert("Kuch likhiye toh sahi, bhai!");

            btn.disabled = true;
            btn.innerHTML = `<i class="fa-solid fa-spinner animate-spin"></i> <span>THINKING...</span>`;

            try {
                // Latest Gemini 1.5 Flash Endpoint
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;
                
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Create a pro prompt: "${inp}". Style: ${config.style}. Prompt only.` }] }]
                    })
                });

                const data = await response.json();
                
                if (data.candidates && data.candidates[0].content) {
                    box.classList.remove('hidden');
                    document.getElementById('outText').innerText = data.candidates[0].content.parts[0].text;
                    box.scrollIntoView({ behavior: 'smooth' });
                } else {
                    alert("API Key Issue: Please ensure the Gemini API is enabled in your Google Cloud Console.");
                }
            } catch (e) {
                alert("Connection Error! Internet check kijiye.");
            } finally {
                btn.disabled = false;
                btn.innerHTML = `<span>GENERATE</span> <i class="fa-solid fa-fire"></i>`;
            }
        }

        function copy() {
            navigator.clipboard.writeText(document.getElementById('outText').innerText);
            alert("Prompt Copied!");
        }
    </script>
</body>
</html>
