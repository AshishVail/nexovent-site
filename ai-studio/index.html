<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexovent AI Studio | Next-Gen Prompting</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: #f8fafc; }
        .glass-card { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(24px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .active-chip { background: linear-gradient(135deg, #2563eb, #9333ea) !important; color: white !important; border: none !important; box-shadow: 0 4px 15px rgba(37, 99, 235, 0.4); }
        .neon-text { background: linear-gradient(135deg, #60a5fa 0%, #c084fc 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .shimmer { animation: shimmer 2s infinite linear; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent); background-size: 200% 100%; }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    </style>
</head>
<body class="min-h-screen p-4 md:p-10">
    <div class="max-w-6xl mx-auto space-y-8">
        <header class="flex justify-between items-center glass-card p-6 rounded-[32px]">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-blue-600 rounded-2xl flex items-center justify-center shadow-lg shadow-blue-500/20">
                    <i class="fa-solid fa-microchip text-white text-xl"></i>
                </div>
                <h1 class="text-2xl font-800 tracking-tighter">NEXOVENT <span class="neon-text">STUDIO</span></h1>
            </div>
            <div id="apiStatus" class="flex items-center gap-2 text-[10px] font-bold text-green-400 uppercase tracking-widest bg-green-400/10 px-4 py-2 rounded-full">
                <span class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></span> Gemini v1.5 Pro Active
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <aside class="lg:col-span-4 space-y-6">
                <div class="glass-card p-6 rounded-[32px] space-y-8">
                    <div>
                        <h3 class="text-xs font-bold text-gray-500 uppercase tracking-widest mb-4 flex items-center gap-2">
                            <i class="fa-solid fa-palette text-blue-400"></i> Visual Style
                        </h3>
                        <div class="grid grid-cols-1 gap-2">
                            <button onclick="selectOption('style', 'Photorealistic Cinematic', this)" class="style-btn active-chip w-full text-left p-4 rounded-2xl border border-white/5 text-sm font-semibold transition-all">📸 Hyper Realistic</button>
                            <button onclick="selectOption('style', 'Cyberpunk Neon Digital', this)" class="style-btn w-full text-left p-4 rounded-2xl border border-white/5 text-sm font-semibold transition-all">🌃 Cyberpunk 2077</button>
                            <button onclick="selectOption('style', 'Fantasy Oil Painting', this)" class="style-btn w-full text-left p-4 rounded-2xl border border-white/5 text-sm font-semibold transition-all">🎨 Fantasy Painting</button>
                        </div>
                    </div>

                    <div>
                        <h3 class="text-xs font-bold text-gray-500 uppercase tracking-widest mb-4">Aspect Ratio</h3>
                        <div class="flex gap-2">
                            <button onclick="selectOption('ratio', '16:9', this)" class="ratio-btn active-chip flex-1 py-3 rounded-xl border border-white/5 text-xs font-bold">16:9</button>
                            <button onclick="selectOption('ratio', '1:1', this)" class="ratio-btn flex-1 py-3 rounded-xl border border-white/5 text-xs font-bold">1:1</button>
                            <button onclick="selectOption('ratio', '9:16', this)" class="ratio-btn flex-1 py-3 rounded-xl border border-white/5 text-xs font-bold">9:16</button>
                        </div>
                    </div>
                </div>
            </aside>

            <main class="lg:col-span-8 space-y-6">
                <div class="glass-card p-8 rounded-[40px] relative overflow-hidden">
                    <div class="shimmer absolute inset-0 pointer-events-none"></div>
                    <textarea id="promptInput" class="w-full h-48 bg-transparent text-3xl font-light placeholder-gray-800 outline-none resize-none" placeholder="Describe your vision..."></textarea>
                    
                    <div class="flex flex-col md:flex-row justify-between items-center mt-10 pt-10 border-t border-white/5 gap-6">
                        <div class="cf-turnstile" data-sitekey="0x4AAAAAAAC8Q1xRQMVIesdD4" data-theme="dark"></div>
                        <button id="igniteBtn" onclick="processAI()" class="w-full md:w-auto bg-blue-600 hover:bg-blue-700 px-12 py-5 rounded-2xl font-800 text-lg flex items-center justify-center gap-3 transition-all transform hover:scale-105 active:scale-95">
                            <span>IGNITE ENGINE</span> <i class="fa-solid fa-fire-flame-curved"></i>
                        </button>
                    </div>
                </div>

                <div id="outputCard" class="hidden glass-card p-10 rounded-[40px] border-l-4 border-blue-500 animate-in fade-in slide-in-from-bottom-4 duration-700">
                    <div class="flex justify-between items-center mb-6">
                        <div class="flex items-center gap-2">
                            <span class="w-2 h-2 bg-blue-500 rounded-full"></span>
                            <span class="text-[10px] font-black uppercase tracking-[0.2em] text-blue-400">AI Generated Prompt</span>
                        </div>
                        <button onclick="copyToClipboard()" class="text-xs bg-white/5 hover:bg-white/10 px-4 py-2 rounded-full transition flex items-center gap-2">
                            <i class="fa-solid fa-copy"></i> Copy
                        </button>
                    </div>
                    <p id="finalPromptOutput" class="text-xl md:text-2xl text-gray-200 font-light leading-relaxed italic"></p>
                </div>
            </main>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
