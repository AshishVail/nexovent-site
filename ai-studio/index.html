<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexovent Studio | Next-Gen AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: #f8fafc; }
        .glass-ui { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .active-btn { background: linear-gradient(135deg, #3b82f6, #8b5cf6) !important; color: white !important; transform: scale(1.02); }
    </style>
</head>
<body class="min-h-screen py-10 px-4">
    <div class="max-w-5xl mx-auto space-y-6">
        
        <header class="glass-ui p-6 rounded-[30px] flex justify-between items-center shadow-2xl">
            <div class="flex items-center gap-2">
                <i class="fa-solid fa-wand-magic-sparkles text-blue-500"></i>
                <h1 class="text-xl font-800 tracking-tighter uppercase">Nexovent <span class="text-blue-500">AI</span></h1>
            </div>
            <span class="text-[10px] font-bold text-blue-400 bg-blue-500/10 px-4 py-1.5 rounded-full">ULTRA V4.5</span>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <aside class="lg:col-span-4 space-y-4">
                <div class="glass-ui p-6 rounded-[30px] space-y-6">
                    <div>
                        <label class="text-[10px] font-bold text-gray-500 uppercase tracking-widest block mb-4">Output Mode</label>
                        <div class="flex flex-col gap-2">
                            <button onclick="updateSettings('style', '8k Realistic Photography', this)" class="mode-btn active-btn w-full text-left p-4 rounded-2xl border border-white/5 text-sm transition-all">📸 Hyper Realism</button>
                            <button onclick="updateSettings('style', 'Anime Digital Illustration', this)" class="mode-btn w-full text-left p-4 rounded-2xl border border-white/5 text-sm transition-all">🎨 Anime Art</button>
                        </div>
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-gray-500 uppercase tracking-widest block mb-4">Ratio</label>
                        <div class="flex gap-2">
                            <button onclick="updateSettings('ratio', '16:9', this)" class="ratio-btn active-btn flex-1 py-3 rounded-xl border border-white/5 text-xs font-bold">16:9</button>
                            <button onclick="updateSettings('ratio', '1:1', this)" class="ratio-btn flex-1 py-3 rounded-xl border border-white/5 text-xs font-bold">1:1</button>
                        </div>
                    </div>
                </div>
            </aside>

            <main class="lg:col-span-8 space-y-6">
                <div class="glass-ui p-8 rounded-[40px] shadow-2xl">
                    <textarea id="promptInput" class="w-full h-40 bg-transparent text-2xl font-light placeholder-gray-800 outline-none resize-none" placeholder="Describe your creative idea..."></textarea>
                    
                    <div class="flex flex-col md:flex-row justify-between items-center mt-6 pt-6 border-t border-white/5 gap-6">
                        <div class="cf-turnstile" data-sitekey="0x4AAAAAAAC8Q1xRQMVIesdD4" data-theme="dark"></div>
                        <button id="genBtn" onclick="igniteAI()" class="w-full md:w-auto bg-blue-600 hover:bg-blue-700 px-12 py-5 rounded-2xl font-bold flex items-center justify-center gap-3 transition-all">
                            <span>GENERATE</span> <i class="fa-solid fa-bolt-lightning"></i>
                        </button>
                    </div>
                </div>

                <div id="outputContainer" class="hidden glass-ui p-8 rounded-[40px] border-l-4 border-blue-500 animate-pulse">
                    <div class="flex justify-between items-center mb-4">
                        <span class="text-[10px] font-black text-blue-400 uppercase tracking-[0.2em]">Prompt Ready</span>
                        <button onclick="copyText()" class="text-xs bg-white/5 px-4 py-2 rounded-full hover:bg-white/10 transition-all">Copy</button>
                    </div>
                    <p id="finalOutput" class="text-lg text-gray-300 italic leading-relaxed"></p>
                </div>
            </main>
        </div>
    </div>

    <script>
        const CONFIG = {
            KEY: "AIzaSyA1ghu59-2eKBR_zumXk2yvrcuTK1CQXUM", // आपकी नई Key यहाँ लगा दी है
            style: "8k Realistic Photography",
            ratio: "16:9"
        };

        function updateSettings(type, val, el) {
            document.querySelectorAll('.' + (type === 'style' ? 'mode' : 'ratio') + '-btn').forEach(b => b.classList.remove('active-btn'));
            el.classList.add('active-btn');
            CONFIG[type] = val;
        }

        async function igniteAI() {
            const input = document.getElementById('promptInput').value.trim();
            const btn = document.getElementById('genBtn');
            const turnstile = document.querySelector('[name="cf-turnstile-response"]')?.value;

            if (!input) return alert("Please type your idea!");
            if (!turnstile) return alert("Security Check Pending!");

            btn.disabled = true;
            btn.innerHTML = `<i class="fa-solid fa-circle-notch animate-spin"></i> <span>THINKING...</span>`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${CONFIG.KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Create a professional image prompt for: "${input}". Style: ${CONFIG.style}. Ratio: --ar ${CONFIG.ratio}. Output ONLY the prompt text.` }] }]
                    })
                });

                const data = await response.json();

                if (data.error) {
                    throw new Error(data.error.message);
                }

                if (data.candidates && data.candidates[0].content) {
                    document.getElementById('outputContainer').classList.remove('hidden');
                    document.getElementById('finalOutput').innerText = data.candidates[0].content.parts[0].text;
                    document.getElementById('outputContainer').scrollIntoView({ behavior: 'smooth' });
                }
            } catch (err) {
                console.error(err);
                alert("AI Error: " + err.message + "\n\nTip: Make sure your Key is active and Billing is enabled in Google Cloud Console.");
            } finally {
                btn.disabled = false;
                btn.innerHTML = `<span>GENERATE</span> <i class="fa-solid fa-bolt-lightning"></i>`;
            }
        }

        function copyText() {
            navigator.clipboard.writeText(document.getElementById('finalOutput').innerText);
            alert("Copied!");
        }
    </script>
</body>
</html>
