<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexovent Blog | Insights & Tools</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: white; }
        .glass-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); }
        #post-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #050505; z-index: 100; overflow-y: auto; padding: 20px; }
    </style>
</head>
<body>
    <nav class="p-6 border-b border-gray-900">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="/" class="text-2xl font-black text-blue-500">NEXOVENT</a>
            <a href="/" class="text-gray-400 hover:text-white">Home</a>
        </div>
    </nav>

    <section class="py-20 px-6 max-w-7xl mx-auto">
        <h1 class="text-5xl font-bold mb-4">Official Blog</h1>
        <p class="text-gray-500 mb-12">Latest articles and digital strategies.</p>
        <div id="blogger-posts" class="grid md:grid-cols-3 gap-8">
            <p>Loading articles...</p>
        </div>
    </section>

    <div id="post-modal">
        <div class="max-w-4xl mx-auto">
            <button onclick="closePost()" class="mb-10 text-blue-500">← Back to Blog List</button>
            <h1 id="modal-title" class="text-4xl font-bold mb-6"></h1>
            <div id="modal-content" class="text-gray-300 leading-relaxed"></div>
        </div>
    </div>

    <script>
        const feedURL = "https://earnguide1.blogspot.com/feeds/posts/default?alt=json-in-script&callback=loadPosts";
        let allPosts = [];

        function loadPosts(data) {
            const container = document.getElementById('blogger-posts');
            container.innerHTML = '';
            allPosts = data.feed.entry || [];
            allPosts.forEach((post, index) => {
                container.innerHTML += `
                    <div class="glass-card p-8 rounded-3xl cursor-pointer" onclick="openPost(${index})">
                        <h3 class="text-xl font-bold mb-4">${post.title.$t}</h3>
                        <span class="text-blue-500 font-bold">Read Post →</span>
                    </div>`;
            });
        }

        function openPost(index) {
            const post = allPosts[index];
            document.getElementById('modal-title').innerText = post.title.$t;
            document.getElementById('modal-content').innerHTML = post.content.$t;
            document.getElementById('post-modal').style.display = 'block';
            window.scrollTo(0,0);
        }

        function closePost() { document.getElementById('post-modal').style.display = 'none'; }

        const script = document.createElement('script');
        script.src = feedURL;
        document.body.appendChild(script);
    </script>
</body>
</html>
</body>
</html>
