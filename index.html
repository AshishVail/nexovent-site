<section id="blog" class="py-24 px-6 max-w-7xl mx-auto">
    <div class="text-center mb-16">
        <h2 class="text-4xl font-bold mb-4">Latest Articles</h2>
        <p class="text-gray-500">Insights from our official blog</p>
    </div>
    <div id="blogger-posts" class="grid md:grid-cols-3 gap-8">
        <p class="text-center col-span-3 text-gray-600">Loading latest posts...</p>
    </div>
</section>

<script>
    // बिना किसी API Key के ब्लॉगर से पोस्ट उठाने का जादू
    const blogID = "1699662621956147747"; 
    const feedURL = `https://www.blogger.com/feeds/${blogID}/posts/default?alt=json-in-script&callback=loadPosts`;

    function loadPosts(data) {
        const container = document.getElementById('blogger-posts');
        container.innerHTML = '';
        const posts = data.feed.entry.slice(0, 3); // सिर्फ लेटेस्ट 3 पोस्ट

        posts.forEach(post => {
            const title = post.title.$t;
            const link = post.link.find(l => l.rel === 'alternate').href;
            const content = post.content ? post.content.$t : post.summary.$t;
            
            // डार्क थीम वाला कार्ड डिज़ाइन
            const card = `
                <div class="glass-card p-6 rounded-3xl hover:border-blue-500/50 transition-all">
                    <h3 class="text-xl font-bold mb-3">${title}</h3>
                    <a href="${link}" target="_blank" class="text-blue-500 font-bold hover:underline">Read More →</a>
                </div>
            `;
            container.innerHTML += card;
        });
    }

    const script = document.createElement('script');
    script.src = feedURL;
    document.body.appendChild(script);
</script>
