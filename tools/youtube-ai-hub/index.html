<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexovent | YouTube AI Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-orange: #ff7a45; /* आपके प्रॉम्प्ट जनरेटर जैसा ऑरेंज */
            --bg-light: #f9fafb;
            --text-dark: #1f2937;
            --card-white: #ffffff;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-light);
            color: var(--text-dark);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
        }

        /* Top Navigation Header */
        .header {
            width: 100%;
            max-width: 600px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            position: absolute;
            top: 0;
        }

        .badge {
            background: var(--primary-orange);
            color: white;
            padding: 4px 12px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 14px;
            text-transform: uppercase;
        }

        .brand-name {
            font-size: 22px;
            font-weight: bold;
            color: #4b5563;
        }

        .home-btn {
            background: black;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* Main Container */
        .container {
            margin-top: 100px;
            max-width: 500px;
            width: 90%;
            text-align: center;
        }

        h1 {
            font-size: 32px;
            margin-bottom: 10px;
            font-weight: 800;
        }

        .subtitle {
            color: #6b7280;
            font-size: 16px;
            margin-bottom: 40px;
            line-height: 1.5;
        }

        /* Card Section */
        .tool-card {
            background: var(--card-white);
            padding: 25px;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: left;
        }

        .step-label {
            font-size: 12px;
            font-weight: 700;
            color: #9ca3af;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
            display: block;
        }

        input[type="text"] {
            width: 100%;
            padding: 15px;
            border-radius: 16px;
            border: 1px solid #e5e7eb;
            background: #fdfdfd;
            font-size: 16px;
            margin-bottom: 25px;
            box-sizing: border-box;
            outline: none;
        }

        input[type="text"]:focus {
            border-color: var(--primary-orange);
        }

        /* Button Grid */
        .button-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 25px;
        }

        .opt-btn {
            padding: 15px;
            border-radius: 16px;
            border: 1px solid #e5e7eb;
            background: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            color: #4b5563;
        }

        .opt-btn.active {
            background: var(--primary-orange);
            color: white;
            border-color: var(--primary-orange);
            box-shadow: 0 4px 12px rgba(255, 122, 69, 0.3);
        }

        /* Generate Button */
        .gen-btn {
            width: 100%;
            padding: 18px;
            border-radius: 20px;
            border: none;
            background: var(--primary-orange);
            color: white;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 6px 20px rgba(255, 122, 69, 0.4);
        }

        /* Result Area */
        #result-box {
            margin-top: 30px;
            background: #fff;
            border-radius: 20px;
            padding: 20px;
            text-align: left;
            border: 1px solid #e5e7eb;
            white-space: pre-wrap;
            display: none; /* Hidden initially */
        }

        .loading-spinner {
            display: none;
            margin: 20px auto;
            width: 30px;
            height: 30px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--primary-orange);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    </style>
</head>
<body>

    <div class="header">
        <span class="badge">Free</span>
        <span class="brand-name">Nexovent<span style="color:#9ca3af">.tech</span></span>
        <a href="/" class="home-btn"><i class="fa-solid fa-house"></i></a>
    </div>

    <div class="container">
        <h1>YouTube AI Hub</h1>
        <p class="subtitle">World's best AI tools for Creators. Optimized for Tags, Titles, and Viral Scripts. Zero cost.</p>

        <div class="tool-card">
            <span class="step-label">Step 1: Enter Video Topic</span>
            <input type="text" id="video-topic" placeholder="e.g. How to grow on YouTube 2026...">

            <span class="step-label">Step 2: Select Tool Type</span>
            <div class="button-grid">
                <button class="opt-btn" onclick="selectType('titles', this)">Viral Titles</button>
                <button class="opt-btn" onclick="selectType('tags', this)">Best Tags</button>
                <button class="opt-btn" onclick="selectType('desc', this)">Detailed Description</button>
                <button class="opt-btn" onclick="selectType('script', this)">Full Script</button>
            </div>

            <button class="gen-btn" onclick="startGeneration()">
                <i class="fa-solid fa-wand-magic-sparkles"></i> GENERATE MASTERPIECE
            </button>
        </div>

        <div class="loading-spinner" id="spinner"></div>
        <div id="result-box"></div>
    </div>

    <script>
        let selectedType = '';

        function selectType(type, btn) {
            selectedType = type;
            document.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        async function startGeneration() {
            const topic = document.getElementById('video-topic').value;
            const resBox = document.getElementById('result-box');
            const spinner = document.getElementById('spinner');

            if (!topic || !selectedType) {
                alert("Please enter a topic and select a tool type!");
                return;
            }

            resBox.style.display = 'none';
            spinner.style.display = 'block';

            // Detailed Content Logic
            setTimeout(() => {
                let finalContent = "";
                
                if(selectedType === 'titles') {
                    finalContent = "🚀 TOP 5 VIRAL TITLES:\n\n1. " + topic + " : 99% People Don't Know This!\n2. How to Master " + topic + " in 2026 (Full Guide)\n3. STOP Doing This if you want to grow in " + topic + "\n4. The Secret Strategy for " + topic + " Exposed\n5. From 0 to Hero in " + topic + " (Hindi)";
                } else if(selectedType === 'tags') {
                    finalContent = "🏷️ TOP 20 SEO TAGS:\n\n" + topic.split(' ').join(', ') + ", youtube growth, viral, trending 2026, " + topic + " tips, nexovent, how to start " + topic + ", amazing " + topic + " video, hindi tutorial, step by step " + topic + ", best tags, seo ranking, 2026 strategy, " + topic + " secrets.";
                } else if(selectedType === 'desc') {
                    finalContent = "📝 DETAILED DESCRIPTION:\n\nIn this video, we explore everything about " + topic + ". We have covered the latest trends and strategies for 2026 to help you stay ahead.\n\n📌 Topics Covered:\n- Basics of " + topic + "\n- Advanced Tips & Tricks\n- Future of " + topic + "\n\nFollow us on Instagram: @nexovent\n#"+topic.replace(/ /g, "")+" #Nexovent #Viral2026";
                } else if(selectedType === 'script') {
                    finalContent = "🎬 FULL VIDEO SCRIPT:\n\n[0:00] HOOK: Shocking news about " + topic + "!\n[0:45] INTRO: Welcome to the channel, let's talk about " + topic + ".\n[2:00] MAIN CONTENT: Point 1: Why " + topic + " matters. Point 2: Secret hacks for 2026.\n[5:30] SUMMARY: Quick recap of all " + topic + " steps.\n[6:00] CTA: Subscribe for more!";
                }

                spinner.style.display = 'none';
                resBox.innerText = finalContent;
                resBox.style.display = 'block';
            }, 1800);
        }
        <script>
        let selectedType = '';

        function selectType(type, btn) {
            selectedType = type;
            // Remove 'active' class from all buttons
            document.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('active'));
            // Add 'active' class to the clicked button
            btn.classList.add('active');
        }

        async function startGeneration() {
            const topic = document.getElementById('video-topic').value;
            const resBox = document.getElementById('result-box');
            const spinner = document.getElementById('spinner');

            if (!topic || !selectedType) {
                alert("Please enter a topic and select a tool type!");
                return;
            }

            // UI Reset & Show Loader
            resBox.style.display = 'none';
            spinner.style.display = 'block';

            try {
                // Calling your secure Vercel API
                const response = await fetch('/api/generate', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        topic: topic,
                        type: selectedType
                    }),
                });

                const data = await response.json();

                if (data.output) {
                    // Displaying the real AI response
                    resBox.innerText = data.output;
                } else {
                    resBox.innerText = "Error: AI could not generate content. Check your API Key.";
                }
            } catch (error) {
                console.error("Error:", error);
                resBox.innerText = "Connection Error: Make sure api/generate.js is uploaded to GitHub.";
            }

            // Hide Loader & Show Result
            spinner.style.display = 'none';
            resBox.style.display = 'block';
        }
    </script>
