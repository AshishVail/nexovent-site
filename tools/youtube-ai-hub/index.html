<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexovent | YouTube AI Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-orange: #ff7a45;
            --bg-light: #f9fafb;
            --text-dark: #1f2937;
            --card-white: #ffffff;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-light);
            color: var(--text-dark);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
        }

        .header {
            width: 100%;
            max-width: 600px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            position: absolute;
            top: 0;
        }

        .badge {
            background: var(--primary-orange);
            color: white;
            padding: 4px 12px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 14px;
            text-transform: uppercase;
        }

        .brand-name {
            font-size: 22px;
            font-weight: bold;
            color: #4b5563;
        }

        .home-btn {
            background: black;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .container {
            margin-top: 100px;
            max-width: 500px;
            width: 90%;
            text-align: center;
        }

        h1 {
            font-size: 32px;
            margin-bottom: 10px;
            font-weight: 800;
        }

        .subtitle {
            color: #6b7280;
            font-size: 16px;
            margin-bottom: 40px;
            line-height: 1.5;
        }

        .tool-card {
            background: var(--card-white);
            padding: 25px;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: left;
        }

        .step-label {
            font-size: 12px;
            font-weight: 700;
            color: #9ca3af;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
            display: block;
        }

        input[type="text"] {
            width: 100%;
            padding: 15px;
            border-radius: 16px;
            border: 1px solid #e5e7eb;
            background: #fdfdfd;
            font-size: 16px;
            margin-bottom: 25px;
            box-sizing: border-box;
            outline: none;
        }

        input[type="text"]:focus {
            border-color: var(--primary-orange);
        }

        .button-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 25px;
        }

        .opt-btn {
            padding: 15px;
            border-radius: 16px;
            border: 1px solid #e5e7eb;
            background: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            color: #4b5563;
        }

        .opt-btn.active {
            background: var(--primary-orange);
            color: white;
            border-color: var(--primary-orange);
            box-shadow: 0 4px 12px rgba(255, 122, 69, 0.3);
        }

        .gen-btn {
            width: 100%;
            padding: 18px;
            border-radius: 20px;
            border: none;
            background: var(--primary-orange);
            color: white;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 6px 20px rgba(255, 122, 69, 0.4);
        }

        #result-box {
            margin-top: 30px;
            background: #fff;
            border-radius: 20px;
            padding: 20px;
            text-align: left;
            border: 1px solid #e5e7eb;
            white-space: pre-wrap;
            display: none;
            line-height: 1.6;
        }

        .loading-spinner {
            display: none;
            margin: 20px auto;
            width: 30px;
            height: 30px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--primary-orange);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="header">
        <span class="badge">Free</span>
        <span class="brand-name">Nexovent<span style="color:#9ca3af">.tech</span></span>
        <a href="/" class="home-btn"><i class="fa-solid fa-house"></i></a>
    </div>

    <div class="container">
        <h1>YouTube AI Hub</h1>
        <p class="subtitle">World's best AI tools for Creators. Optimized for Tags, Titles, and Viral Scripts. Zero cost.</p>

        <div class="tool-card">
            <span class="step-label">Step 1: Enter Video Topic</span>
            <input type="text" id="video-topic" placeholder="e.g. How to grow on YouTube 2026...">

            <span class="step-label">Step 2: Select Tool Type</span>
            <div class="button-grid">
                <button class="opt-btn" onclick="selectType('Viral Titles', this)">Viral Titles</button>
                <button class="opt-btn" onclick="selectType('Best Tags', this)">Best Tags</button>
                <button class="opt-btn" onclick="selectType('Detailed Description', this)">Description</button>
                <button class="opt-btn" onclick="selectType('Complete Video Script', this)">Full Script</button>
            </div>

            <button class="gen-btn" onclick="startGeneration()">
                <i class="fa-solid fa-wand-magic-sparkles"></i> GENERATE MASTERPIECE
            </button>
        </div>

        <div class="loading-spinner" id="spinner"></div>
        <div id="result-box"></div>
    </div>

    <script>
        let selectedType = '';

        function selectType(type, btn) {
            selectedType = type;
            document.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        async function startGeneration() {
            const topic = document.getElementById('video-topic').value;
            const resBox = document.getElementById('result-box');
            const spinner = document.getElementById('spinner');

            if (!topic || !selectedType) {
                alert("Please enter a topic and select a tool type!");
                return;
            }

            resBox.style.display = 'none';
            spinner.style.display = 'block';

            try {
                // यह API (api/generate.js) को कॉल करेगा जो Vercel पर सुरक्षित है
                const response = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ topic: topic, type: selectedType })
                });

                const data = await response.json();

                if (data.output) {
                    resBox.innerText = data.output;
                } else {
                    resBox.innerText = "Error: AI could not generate content. Please try again.";
                }
            } catch (error) {
                console.error("Error:", error);
                resBox.innerText = "Connection Error: Ensure api/generate.js exists on GitHub and API key is in Vercel.";
            }

            spinner.style.display = 'none';
            resBox.style.display = 'block';
        }
    </script>
</body>
</html>
