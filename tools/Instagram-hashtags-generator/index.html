<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Hashtag Generator | Nexovent</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0c0e12; color: white; }
        .glass-card { background: #12161b; border: 1px solid #2d2d2d; border-radius: 2rem; }
        .btn-gradient { background: linear-gradient(135deg, #d946ef 0%, #a855f7 100%); }
        .hashtag-item { background: rgba(217, 70, 239, 0.1); border: 1px solid rgba(217, 70, 239, 0.2); border-radius: 0.75rem; padding: 0.5rem 1rem; font-size: 0.875rem; color: #f5d0fe; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <nav class="max-w-4xl mx-auto py-4 flex justify-between items-center mb-12">
        <a href="https://nexovent.tech" class="text-xl font-black text-blue-500 tracking-tighter">NEXOVENT</a>
        <a href="../" class="text-xs font-bold text-gray-500 hover:text-white transition">← BACK</a>
    </nav>

    <div class="max-w-2xl mx-auto text-center mb-12">
        <h1 class="text-3xl font-black mb-4 uppercase tracking-tight italic">SambaNova <span class="text-fuchsia-500">AI Engine</span></h1>
        <p class="text-gray-500 text-sm">Professional Hashtag Generation based on Post Title.</p>
    </div>

    <div class="max-w-2xl mx-auto glass-card p-6 md:p-10 mb-8">
        <div class="mb-6">
            <label class="block text-xs font-black uppercase tracking-widest text-gray-400 mb-3">Post Title or Topic</label>
            <input type="text" id="topicInput" placeholder="Enter your video/post title here..." 
                class="w-full bg-[#0c0e12] border border-gray-800 rounded-xl p-4 text-white focus:outline-none focus:border-fuchsia-500 transition">
        </div>

        <button onclick="fetchHashtags()" id="genBtn" class="w-full btn-gradient p-4 rounded-xl font-black uppercase tracking-widest text-sm mb-6 transition-all hover:opacity-90">
            Generate Viral Tags <i class="fas fa-bolt ml-2"></i>
        </button>

        <div id="loading" class="hidden text-center py-8">
            <div class="inline-block animate-spin rounded-full h-8 w-8 border-t-2 border-b-2 border-fuchsia-500 mb-2"></div>
            <p class="text-[10px] text-gray-500 font-bold uppercase tracking-widest">SambaNova AI is analyzing...</p>
        </div>

        <div id="resultBox" class="hidden animate-in fade-in duration-500">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xs font-black uppercase tracking-widest text-gray-400">Optimized Hashtags</h3>
                <button onclick="copyAll()" class="text-[10px] font-black text-fuchsia-500 uppercase tracking-widest"><i class="fas fa-copy mr-1"></i> Copy</button>
            </div>
            <div id="outputArea" class="bg-[#0c0e12] p-4 rounded-xl border border-gray-800 text-sm leading-relaxed text-gray-300 whitespace-pre-wrap">
                </div>
        </div>
    </div>

    <script>
        async function fetchHashtags() {
            const topic = document.getElementById('topicInput').value;
            const btn = document.getElementById('genBtn');
            const loading = document.getElementById('loading');
            const resultBox = document.getElementById('resultBox');
            const outputArea = document.getElementById('outputArea');

            if (!topic) return alert("Please enter a title!");

            btn.disabled = true;
            loading.classList.remove('hidden');
            resultBox.classList.add('hidden');

            try {
                // यह आपके Vercel के बैकएंड (generate.js) को कॉल करेगा
                const response = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        topic: topic, 
                        type: "30 highly viral and niche-specific Instagram hashtags. Return only hashtags separated by space." 
                    })
                });

                const data = await response.json();
                outputArea.innerText = data.output;
                resultBox.classList.remove('hidden');
            } catch (error) {
                alert("Server Error. Please try again.");
            } finally {
                loading.classList.add('hidden');
                btn.disabled = false;
            }
        }

        function copyAll() {
            const text = document.getElementById('outputArea').innerText;
            navigator.clipboard.writeText(text);
            alert("Copied to clipboard!");
        }
    </script>
</body>
</html>
